# paths:
#   input: "../../../../../../../../../"
#   output: "data/summary/tables/fetal_SP"

summary:
  input_table:
    path: "ehr2meds/data/raw/fetal_data/overview/overview.csv"
    key_columns: [MOR_CPR]
    additional_columns: [cervix_scan_date]
    time_window:
      max_date: cervix_scan_date
        
  linked_columns: 
    SP_PTB_obs_history:
      source_file: SP/tables/Mor - Obstetrisk Historik DEL 2.csv
      type: 
        function: latest_entry
        args:
          target_col: Antal tidligere spontane aborter
          date_col: Kontakt dato
      key_values:
        MOR_CPR: CPR
      time_window:
        timestamp: Kontakt dato

    SP_PTB_diag_history:
      source_file: SP/tables/Mor - CPMI - Diagnoseliste.csv
      type: 
        function: has_one_of_values
        args:
          target_col: Diagnosekode
      filter: 
        function: include_exclude
        args:
          target_col: Diagnosekode
          include: ["DZ358B", "DO609", "DO601"]
          # exclude: []
      key_values:
        MOR_CPR: CPR
      time_window:
        timestamp: Redigeringsdato

    SP_late_miscarriage_diag:
      source_file: SP/tables/Mor - CPMI - Diagnoseliste.csv
