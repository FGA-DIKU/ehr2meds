paths:
  output: "data/raw/fetal_data/LPR3"


data:
  kontakter: 
    N: 20
    corruptions:
      - type: row_dropout
        args:
          probability: 0.05
          forced_idx: [5, 10]
    columns:
      person_id:
        type: person_id
        corruptions:
          - type: truncation
            args:
              max_length: 5
              probability: 0.05
              forced_idx: [3]
      aktionsdiagnose:
        type: medical_code
        args:
          prefix: "D"
      priority: # urgency
        type: choice
        args:
          options: [1, 2, 3]
      dato_start:
        type: rand_date
      tidspunkt_start:
        type: rand_time
      dato_slut:
        type: greater_than_date
        match:
          min_date: dato_start
      tidspunkt_slut:
        type: rand_time
      contact_id:
        type: rand_int
        args:
          min_val: 1
          max_val: 600000
      forloeb_id: 
        type: rand_int
        args:
          min_val: 1
          max_val: 600000


linked_data: # Data that needs to be linked to the data above
  diagnoser:
    N: 20
    columns:
      diagnosekode:
        type: medical_code
        args:
          prefix: "D"
      diagnose_type:
        type: choice
        args:
          options: ["A", "B", "+"]

    linked_columns:
      dw_ek_kontakt: 
        type: choice
        file: LPR3_kontakter
        linked_on: [contact_id]
        rename_to: contact_id
    
      
