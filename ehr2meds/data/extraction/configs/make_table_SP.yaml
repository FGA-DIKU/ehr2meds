# Example: run from repo root, e.g.
#python -m ehr2meds.data.extraction.extract_data --config ehr2meds/data/extraction/SP.yaml --input ehr2meds/data/raw/fetal_data/SP --output ehr2meds/data/summary/tables/fetal_SP

overwrite_files: false

main_table:
  sources:
    - pregnancy_history.csv
    - GA_delivery.csv
  merge_columns: [m_cpr, date]
  add_columns:
    - name: pregnancy_start
      function: get_pregnancy_start
      args:
        birthdate: date
        GA: GA
  rename_columns:
    date: pregnancy_end

linked_tables:
    # maternal variables
    - name: ethnicity
      source_file: static_maternal_variables.csv
      match_on: [m_cpr]
      function: extract_column
      args:
        target_col: [ethnicity]
    - name: maternal_age
      source_file: static_maternal_variables.csv
      match_on: [m_cpr]
      function: get_time_difference
      args:
        start_time: birthdate
        end_time: pregnancy_start
        unit: years
    - name: maternal_BMI
      source_file: dynamic_maternal_variables.csv
      match_on: [baby_birth_id]
      function: extract_column
      args:
        target_col: [BMI_before_pregnancy]
    - name: alcohol_consumption
      source_file: dynamic_maternal_variables.csv
      match_on: [m_cpr]
      function: latest_entry
      args:
        target_col: [alcohol_consumption]
        date_col: date
        max_date: pregnancy_start
    - name: smoking
      source_file: dynamic_maternal_variables.csv
      match_on: [m_cpr]
      function: latest_entry
      args:
        target_col: [smoking]
        date_col: date
        max_date: pregnancy_start

    # pregnancy variables
    - name: multi_pregnancy_diagnosis
      source_file: multi_pregnancy_diagnosis.csv
      match_on: [m_cpr]
      function: bool_in_time_window
      args:
        min_date: pregnancy_start
        max_date: pregnancy_end
        timestamp: date
    - name: multi_pregnancy_birth_id
      source_file: multi_pregnancy_birth_id.csv
      match_on: [baby_birth_id]
      function: is_present_bool
      args:
        target_col: [code]
    - name: multi_pregnancy_obs_history
      source_file: multi_pregnancy_obs_history.csv
      match_on: [m_cpr]
      function: bool_in_time_window
      args:
        min_date: pregnancy_start
        max_date: pregnancy_end
        timestamp: date

    - name: ivf_pregnancy
      source_file: IVF_pregnancy.csv
      match_on: [m_cpr]
      function: bool_in_time_window
      args:
        min_date: pregnancy_start
        max_date: pregnancy_end
        timestamp: date
    - name: fertility_treatment
      source_file: fertility_treatment.csv
      match_on: [m_cpr]
      function: bool_in_time_shifted_window
      args:
        shift_max_days: 365
        max_date: pregnancy_start
        timestamp: date

    - name: parity
      source_file: parity.csv
      match_on: [m_cpr]
      function: latest_entry
      args:
        target_col: [parity]
        date_col: date
        max_date: pregnancy_start

    - name: earlier_ptb_from_diagnosis
      source_file: ptb_diagnosis.csv
      match_on: [m_cpr]
      function: bool_in_time_window
      args:
        max_date: pregnancy_start
        timestamp: date
    - name: earlier_ptb_obs_history
      source_file: ptb_obs_history.csv
      match_on: [m_cpr]
      function: bool_in_time_window
      args:
        max_date: pregnancy_start
        timestamp: date

    - name: pprom_current_pregnancy
      source_file: PPROM_diagnosis.csv
      match_on: [m_cpr]
      function: bool_in_time_window
      args:
        min_date: pregnancy_start
        max_date: pregnancy_end
        timestamp: date
    - name: pprom_previous_pregnancy
      source_file: PPROM_diagnosis.csv
      match_on: [m_cpr]
      function: bool_in_time_window
      args:
        max_date: pregnancy_start
        timestamp: date

    - name: previous_short_cervix_diagnosis
      source_file: short_cervix_diagnosis.csv
      match_on: [m_cpr]
      function: bool_in_time_window
      args:
        max_date: pregnancy_start
        timestamp: date
    - name: previous_short_cervical_length_history
      source_file: short_cervical_length_history.csv
      match_on: [m_cpr]
      function: bool_in_time_window
      args:
        max_date: pregnancy_start
        timestamp: date

    - name: cesarean_section
      source_file: cesarean_section.csv
      match_on: [m_cpr]
      function: bool_in_time_window
      args:
        max_date: pregnancy_start
        timestamp: date

    - name: labor_induction
      source_file: labor_induction.csv
      match_on: [baby_birth_id]
      function: 
        function: is_present_bool
        args:
          target_col: [code]

collapse_table:
  - name: m_age
    combine:
      function: add_column
    components: 
      - maternal_age
  - name: m_ethnicity
    combine:
      function: add_column
    components: 
      - ethnicity
  - name: m_BMI
    combine:
      function: add_column
    components: 
      - maternal_BMI
  - name: m_alcohol_consumption
    combine:
      function: add_column
    components: 
      - alcohol_consumption
  - name: m_smoking
    combine:
      function: add_column
    components: 
      - smoking

    # pregnancy history
  - name: conception_w_fertility_treatment
    combine:
      function: or_columns
    components: 
      - fertility_treatment
      - ivf_pregnancy
  - name: multiple_pregnancy
    combine:
      function: or_columns
    components:
      - multi_pregnancy_diagnosis
      - multi_pregnancy_birth_id
      - multi_pregnancy_obs_history
  - name: parity
    combine:
      function: add_column
    components: 
      - parity
  - name: previous_ptb
    combine:
      function: or_columns
    components:
      - earlier_ptb_from_diagnosis
      - earlier_ptb_obs_history
  - name: previous_pprom
    function: add_column
    components:
      - pprom_previous_pregnancy
  - name: current_pprom
    combine:
      function: add_column
    components:
      - pprom_current_pregnancy
  - name: previous_short_cervical_length
    combine:
      function: or
    components:
      - previous_short_cervical_length_history
      - previous_short_cervix_diagnosis
  - name: cesarean_section
    combine:
      function: add_column
    components:
      - cesarean_section
  - name: labor_induction
    combine:
      function: add_column
    components:
      - labor_induction