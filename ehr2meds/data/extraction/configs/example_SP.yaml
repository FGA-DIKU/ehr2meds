# Example: run from repo root, e.g.
#   python -m ehr2meds.data.extraction.extract_data \
#     --config ehr2meds/data/extraction/SP.yaml \
#     --input ehr2meds/data/raw/fetal_data/SP \
#     --output ehr2meds/data/summary/tables/fetal_SP

data_extraction:
  GA_delivery:
    key_columns: [m_cpr, date]
    sources:
      - source_file: Obstetrical_history_2.csv
        type:
          function: extract_GA
          args:
            target_col: Gestationsalder
        map_columns:
          CPR: m_cpr
          Dato: date
          Gestationsalder: GA
