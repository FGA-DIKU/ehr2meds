# Example: run from repo root, e.g.
#python -m ehr2meds.data.extraction.extract_data --config ehr2meds/data/extraction/SP.yaml --input ehr2meds/data/raw/fetal_data/SP --output ehr2meds/data/summary/tables/fetal_SP

overwrite_files: false

data_extraction:
  pregnancy_history:
    key_columns: [m_cpr, baby_cpr, date]
    sources:
      - source_file: nyfoedte.csv
        map_columns:
          CPRnummer_Mor: m_cpr
          CPRnummer_Barn: baby_cpr
          FoedselsDato_Barn: date
      - source_file: mfr.csv
        map_columns:
          CPR_BARN: baby_cpr
          CPR_MODER: m_cpr
          FOEDSELSDATO: date

  GA_delivery:
    key_columns: [baby_cpr, date]
    sources:
      - source_file: nyfoedte.csv
        map_columns:
          CPRnummer_Barn: baby_cpr
          FoedselsDato_Barn: date
          Gestationsalder: GA_days
      - source_file: mfr.csv
        map_columns:
          CPR_BARN: baby_cpr
          GESTATIONSALDER_DAGE: GA_days
          FOEDSELSDATO: date

  # TODO ethnicity 
  country_of_origin:
    key_columns: [m_cpr]
    sources:
      - source_file: indvandrer_efterkommer.csv
        map_columns:
          V_PNR: m_cpr
          oprindelses_land_tekst: country_of_origin
  
  dynamic_maternal_variables:
    key_columns: [baby_cpr]
    combine: merge
    sources:
      - source_file: nyfoedte.csv
        map_columns:
          CPRnummer_Barn: baby_cpr
          Tobaksforbrug: smoking
          # "Alkoholforbrug": alcohol_consumption
          FoedselsDato_Barn: birthdate
          BMI_Mor: maternal_BMI
          Alder_Mor: maternal_age
      - source_file: mfr.csv
        map_columns:
          CPR_BARN: baby_cpr
          RYGERSTATUS_MODER: smoking
          BMI_MODER: maternal_BMI
          ALDER_MODER: maternal_age
  
  # TODO cervical_scans_MFR2

  cervical_scans_MFR3:
    key_columns: [birth_id]
    combine: merge
    sources:
      - source_file: nyfoedte.csv
        map_columns:
          CPRnummer_Mor: m_cpr
          CPRnummer_Barn: baby_cpr
          DW_EK_Foedsel: birth_id
      - source_file: mor_procedurer.csv
        type:
          function: extract_codes
          args:
            target_col: ProcedureKode
            match_on: ["UXUD85"]
            match_type: startswith
        map_columns:
          DW_EK_Foedsel: birth_id
          ProcedureKode: code
          StartDato_Procedure: scan_date
  
  # TODO fertility_treatment  
  ivf_treatment: 
    key_columns: [m_cpr]
    sources:
      - source_file: ivf_behandlingsforloeb.csv
        type:
          function: extract_codes
          args:
            target_col: Graviditet
            match_on: ["Ja"]
            match_type: exact
        map_columns:
          CPRnummer: m_cpr
          Graviditet: code
          Transferering_dato: date

  multi_pregnancy_MFR3:
    key_columns: [baby_cpr]
    sources:
      - source_file: nyfoedte.csv
        map_columns:
          CPRnummer_Barn: baby_cpr
          AntalBoernIFoedslen: code
    filter:
      function: bool_match
      args:
        target_col: code
        op: ">"
        val: 1
  
  multi_pregnancy_MFR2:
    key_columns: [baby_cpr]
    sources:
      - source_file: mfr.csv
        type:
          function: extract_codes
          args:
            target_col: FLERFOLDSGRAVIDITET
            match_on: [" "]
            match_type: exact
            exclude: True
        map_columns:
          CPR_BARN: baby_cpr
          FLERFOLDSGRAVIDITET: code

  parity:
    key_columns: [baby_cpr, m_cpr, date]
    sources:
      - source_file: nyfoedte.csv
        map_columns:
          CPRnummer_Barn: baby_cpr
          CPRnummer_Mor: m_cpr
          Paritet: parity
      - source_file: mfr.csv
        map_columns:
          CPR_BARN: baby_cpr
          CPR_MODER: m_cpr
          PARITET: parity
  
  ptb_GA_under_37:
    key_columns: [baby_cpr, m_cpr, date]
    sources:
      - source_file: nyfoedte.csv
        map_columns:
          CPRnummer_Barn: baby_cpr
          Gestationsalder: GA_days
          CPRnummer_Mor: m_cpr
          FoedselsDato_Barn: date
      - source_file: mfr.csv
        map_columns:
          CPR_BARN: baby_cpr
          GESTATIONSALDER_DAGE: GA_days
          FOEDSELSDATO: date
          CPR_MODER: m_cpr
    filter:
      function: bool_match
      args:
        target_col: GA_days
        op: "<"
        val: 259

  PRROM_MFR2:
    key_columns: [baby_cpr, m_cpr, date]
    sources:
      - source_file: mfr.csv
        type:
          function: extract_codes
          args:
            target_col: PPROM
            match_on: [" "]
            match_type: exact
            exclude: True
        map_columns:
          CPR_BARN: baby_cpr
          PPROM: code
          FOEDSELSDATO: date
      - source_file: mfr.csv
        type:
          function: extract_codes
          args:
            target_col: PROM
            match_on: [" "]
            match_type: exact
            exclude: True
        map_columns:
          CPR_BARN: baby_cpr
          PROM: code

