          DW_EK_Foedsel: birth_id
          FoedselsDato_Barn: date
      - source_file: mor_diagnoser.csv
        type:
          function: extract_codes
          args:
            target_col: DiagnoseKode
            match_on: ["DO422", "DO420", "DO424"]
            match_type: startswith
        map_columns:
          DW_EK_Foedsel: birth_id
          DiagnoseKode: code
  
