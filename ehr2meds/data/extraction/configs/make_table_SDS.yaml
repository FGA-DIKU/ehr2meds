      - current_cervical_conization_procedures_MFR3

  - name: multiple_pregnancy
    combine:
      function: or_columns
    components:
      - multi_pregnancy_MFR2
      - multi_pregnancy_MFR3
  - name: uterine_malformation
    combine:
      function: add_column
    components:
      - uterine_malformation_MFR3
  - name: fibroids
    combine:
      function: or_columns
    components:
      - fibroids
      - fibroids_MFR2
  - name: polyhydramnios
