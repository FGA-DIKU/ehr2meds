  - name: current_pprom
    combine:
      function: or_columns
    components:
      - pprom_current_pregnancy_MFR3
      - pprom_current_pregnancy_MFR2
  - name: maternal_comorbidity
    combine:
      function: add_column
    components:
      - maternal_comorbidity_MFR3

  - name: labor_induction
    combine:
      function: or_columns
    components:
      - labor_induction_HSP_MFR3
      - labor_induction_Ballon_MFR3
      - labor_induction_MFR2
  - name: cesarean_section
    combine:
      function: or_columns
    components:
      - current_cesarean_section_MFR2_main
      - current_cesarean_section_MFR3_main
