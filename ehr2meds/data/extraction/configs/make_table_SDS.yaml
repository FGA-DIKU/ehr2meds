collapse_table:
  - name: m_age
    combine:
      function: add_column
    components:
      - maternal_age
  - name: m_BMI
    combine:
      function: add_column
    components:
      - maternal_BMI
  - name: m_smoking
    combine:
      function: add_column
    components:
      - smoking

  - name: multiple_pregnancy
    combine:
      function: or_columns
    components:
      - multi_pregnancy_MFR2
      - multi_pregnancy_MFR3
  - name: parity
    combine:
      function: add_column
    components:
      - parity
  - name: previous_ptb
    combine:
      function: add_column
    components:
      - earlier_ptb
