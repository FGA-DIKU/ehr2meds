  - name: previous_preclampsia_diagnosis_MFR3
    source_file: preclampsia_MFR3.csv
    match_on: [m_cpr]
    function: bool_in_time_window
    args:
      max_date: pregnancy_start
      timestamp: date
  - name: previous_preclampsia_diagnosis_MFR2
