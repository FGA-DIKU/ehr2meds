# Build the SDS summary table from CSVs produced by extract_SDS_data.yaml, e.g.
# python -m ehr2meds.data.extraction.extract_data \
#   --config ehr2meds/data/extraction/configs/extract_SDS_data.yaml \
#   --input <raw_dir> --output <extracted_dir>
# python -m ehr2meds.data.extraction.make_table \
#   --config ehr2meds/data/extraction/configs/make_table_SDS.yaml \
#   --input <extracted_dir> --output <out_dir> --save_name fetal_SDS

overwrite_files: false

main_table:
  sources:
    - pregnancy_history.csv
    - GA_delivery.csv
  merge_columns: [baby_cpr, date]
  add_columns:
    - name: GA_weeks
      function: get_GA_weeks
      args:
        GA_days: GA_days
    - name: pregnancy_start
      function: get_pregnancy_start
      args:
        birthdate: date
        GA: GA_weeks
  rename_columns:
    date: pregnancy_end

linked_tables:
  # Cervical length ultrasound codes (MFR2 / MFR3); GA at scan from delivery GA_days on main row.
  # - name: cervical_scan_GA_MFR2
  #   source_file: cervical_scans_MFR2.csv
  #   match_on: [baby_cpr]
  #   function: get_GA_at_date
  #     args:
  #       date: scan_date
  #       GA_col: GA_weeks
  #       pregnancy_start: pregnancy_start
  #       pregnancy_end: pregnancy_end
  - name: cervical_scan_GA_MFR3
    source_file: cervical_scans_MFR3.csv
    match_on: [baby_cpr]
    function: get_GA_at_date
    args:
      date: scan_date
      GA_col: GA_weeks
      pregnancy_start: pregnancy_start
      pregnancy_end: pregnancy_end

  - name: maternal_age
    source_file: dynamic_maternal_variables.csv
    match_on: [baby_cpr]
    function: extract_column
    args:
      target_col: maternal_age
  - name: maternal_BMI
    source_file: dynamic_maternal_variables.csv
    match_on: [baby_cpr]
    function: extract_column
    args:
      target_col: maternal_BMI
  - name: smoking
    source_file: dynamic_maternal_variables.csv
    match_on: [baby_cpr]
    function: extract_column
    args:
      target_col: smoking

  - name: multi_pregnancy_MFR2
    source_file: multi_pregnancy_MFR2.csv
    match_on: [baby_cpr]
    function: is_present_bool
    args:
      target_col: code
  - name: multi_pregnancy_MFR3
    source_file: multi_pregnancy_MFR3.csv
    match_on: [baby_cpr]
    function: is_present_bool
    args:
      target_col: code

  - name: parity
    source_file: parity.csv
    match_on: [baby_cpr]
    function: extract_column
    args:
      target_col: parity

  - name: earlier_ptb
    source_file: ptb_GA_under_37.csv
    match_on: [m_cpr]
    function: bool_in_time_window
    args:
      max_date: pregnancy_start
      timestamp: date

  - name: pprom_current_pregnancy
    source_file: PPROM_MFR3.csv
    match_on: [baby_cpr]
    function: bool_in_time_window
    args:
      min_date: pregnancy_start
      max_date: pregnancy_end
      timestamp: date
  - name: pprom_previous_pregnancy
    source_file: PPROM_MFR3.csv
    match_on: [baby_cpr]
    function: bool_in_time_window
    args:
      max_date: pregnancy_start
      timestamp: date
