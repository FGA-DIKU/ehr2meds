      - parity
  - name: previous_ptb
    combine:
      function: add_column
    components:
      - earlier_ptb
  - name: previous_pprom
    combine:
      function: or_columns
    components:
      - pprom_previous_pregnancy_MFR3
      - pprom_previous_pregnancy_MFR2
  - name: previous_cesarean_section
    combine:
      function: or_columns
