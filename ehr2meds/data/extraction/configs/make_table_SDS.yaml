collapse_table:
  - name: cervical_scan_GA
    combine:
      function: add_column
    components:
      - cervical_scan_GA_MFR3

  - name: m_country_of_origin
    combine:
      function: add_column
    components:
      - country_of_origin
  - name: m_age
    combine:
      function: add_column
    components:
      - maternal_age
  - name: m_BMI
    combine:
      function: add_column
    components:
      - maternal_BMI
  - name: m_smoking
    combine:
      function: add_column
