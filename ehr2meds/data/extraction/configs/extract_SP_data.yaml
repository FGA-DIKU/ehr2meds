# Example: run from repo root, e.g.
#python -m ehr2meds.data.extraction.extract_data --config ehr2meds/data/extraction/SP.yaml --input ehr2meds/data/raw/fetal_data/SP --output ehr2meds/data/summary/tables/fetal_SP

overwrite_files: false

data_extraction:
  GA_delivery:
    key_columns: [m_cpr, date]
    sources:
      - source_file: Mor - Obstetrisk Historik DEL 2.csv
        type:
          function: extract_GA
          args:
            target_col: Gestationsalder
        map_columns:
          MOR_CPR: m_cpr
          Dato: date
          Gestationsalder: GA

  maternal_variables:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Patientinfo.csv
        type:
          function: extract_columns
          args:
            target_cols: [Fødselsdato]
        map_columns:
          MOR_CPR: m_cpr
          Fødselsdato: birthdate
      - source_file: Mor - Patientinfo tillæg til CPMI.csv
        type:
          function: extract_columns
          args:
            target_cols: [Alkohol - Antal ugentlige genstande, Rygestatus, Dato for seneste opdatering, Etnicitet]
        map_columns:
          MOR_CPR: m_cpr
          "Alkohol - Antal ugentlige genstande": alcohol_consumption
          Rygestatus: smoking
          "Dato for seneste opdatering": date
          Etnicitet: ethnicity
  
  pregnancy_history:
    key_columns: [m_cpr]
    sources:
      - source_file: Population.csv
        type:
          function: extract_columns
          args:
            target_cols: [MOR_CPR, BABY_CPR, Fødselstidspunkt, BABY_Fødsel_ID]
        map_columns:
          MOR_CPR: m_cpr
          BABY_CPR: baby_cpr
          Fødselstidspunkt: birthdate
          BABY_Fødsel_ID: baby_birth_id
  
  cervical_scans:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Procedurer.csv
        type:
          function: extract_codes
          args:
            target_col: ProcedureCode
            match_on: ["UXUD85"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          ProcedureCode: code
          ServiceDate: date
  
  fertility_treatment:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Procedurer.csv
        type:
          function: extract_codes
          args:
            target_col: ProcedureCode
            match_on: ["BBHG38", "BJFL0", "AFV01G", ]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          ProcedureCode: code
          ServiceDate: date
      - source_file: Mor - CPMI - Diagnoseliste.csv
        type:
          function: extract_codes
          args:
            target_col: Diagnosekode
            match_on: ["DZ314", "DZ318", "DZ319"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          Diagnosekode: code
          Noteret_dato: date
  
  IVF_pregnancy:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Diagnoseliste.csv
        type:
          function: extract_codes
          args:
            target_col: Diagnosekode
            match_on: ["DO003B", "DZ321H", "DZ358F"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          Diagnosekode: code
          Noteret_dato: date

  multi_pregnancy_diagnosis:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Diagnoseliste.csv
        type:
          function: extract_codes
          args:
            target_col: Diagnosekode
            match_on: ["DO30", "DO31"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          Diagnosekode: code
          Noteret_dato: date

  multi_pregnancy_birth_id:
    key_columns: [m_cpr, baby_birth_id]
    sources:
      - source_file: Population.csv
        type:
          function: extract_columns
          args:
            target_cols: [MOR_CPR, BABY_CPR, Fødselstidspunkt, BABY_Fødsel_ID]
        map_columns:
          MOR_CPR: m_cpr
          BABY_CPR: baby_cpr
          Fødselstidspunkt: birthdate
          BABY_Fødsel_ID: baby_birth_id
      - source_file: Mor - Fødselsresume - DEL 1.csv
        type:
          function: fill_matches
          args:
            target_col: "Foster nr."
            match_on: ["Foster 2", "Foster 3", "Foster 4"]
            match_type: exact
            fill_value: "Multiple preg (fødselsresume)"
        map_columns:
          MOR_CPR: m_cpr
          fill_col: code
          BABY_Fødsel_ID: baby_birth_id
    filter:
      function: drop_empty_columns
      args:
        columns: [code]
    
  parity:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - Obstetrisk Historik DEL 1.csv
        type:
          function: extract_columns
          args:
            target_cols: ["Para"]
        map_columns:
          MOR_CPR: m_cpr
          "Para": parity
          "Kontakt dato": date
  
  ptb_diagnosis:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Diagnoseliste.csv
        type:
          function: extract_codes
          args:
            target_col: Diagnosekode
            match_on: ["DZ358B", "DO609", "DO601"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          Diagnosekode: code
          Noteret_dato: date
    filter:
      function: drop_empty_columns
      args:
        columns: [code]

  ptb_birth_id:
    key_columns: [m_cpr, baby_birth_id]
    sources:
      - source_file: Population.csv
        type:
          function: extract_columns
          args:
            target_cols: [MOR_CPR, BABY_CPR, Fødselstidspunkt, BABY_Fødsel_ID]
        map_columns:
          MOR_CPR: m_cpr
          BABY_CPR: baby_cpr
          Fødselstidspunkt: birthdate
      - source_file: Mor - Obstetrisk Historik DEL 1.csv
        type:
          function: extract_columns
          args:
            target_cols: ["Præterm"]
          map_columns:
            MOR_CPR: m_cpr
            "Præterm": ptb
            "Kontakt dato": date
  
  PPROM_diagnosis:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Diagnoseliste.csv
        type:
          function: extract_codes
          args:
            target_col: Diagnosekode
            match_on: ["DO422", "DO420", "DO424"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          Diagnosekode: code
          Noteret_dato: date

