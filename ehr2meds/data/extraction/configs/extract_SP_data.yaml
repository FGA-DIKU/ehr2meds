# Example: run from repo root, e.g.
#python -m ehr2meds.data.extraction.extract_data --config ehr2meds/data/extraction/SP.yaml --input ehr2meds/data/raw/fetal_data/SP --output ehr2meds/data/summary/tables/fetal_SP

overwrite_files: false
drop_empty_rows: [m_cpr]

data_extraction:
  GA_delivery:
    key_columns: [m_cpr, date]
    sources:
      - source_file: Mor - Obstetrisk Historik DEL 2.csv
        type:
          function: extract_GA
          args:
            target_col: Gestationsalder
        map_columns:
          MOR_CPR: m_cpr
          Dato: date
          Gestationsalder: GA

  static_maternal_variables:
    key_columns: [m_cpr]
    combine: merge
    sources:
      - source_file: Mor - CPMI - Patientinfo.csv
        map_columns:
          MOR_CPR: m_cpr
          Fødselsdato: birthdate
      - source_file: Mor - Patientinfo tillæg til CPMI.csv
        map_columns:
          MOR_CPR: m_cpr
          Etnicitet: ethnicity
  
  dynamic_maternal_variables:
    key_columns: [m_cpr]
    combine: merge
    sources:
      - source_file: Mor - Patientinfo tillæg til CPMI.csv
        map_columns:
          MOR_CPR: m_cpr
          "Alkohol - Antal ugentlige genstande": alcohol_consumption
          Rygestatus: smoking
          "Dato for seneste opdatering": date
      - source_file: Mor - Fødselsresume - DEL 1.csv
        map_columns:
          MOR_CPR: m_cpr
          "Vægt før graviditet": BMI_before_pregnancy
          BABY_Fødsel_ID: baby_birth_id

  pregnancy_history:
    key_columns: [m_cpr]
    sources:
      - source_file: Population.csv
        map_columns:
          MOR_CPR: m_cpr
          BABY_CPR: baby_cpr
          Fødselstidspunkt: date
          BABY_Fødsel_ID: baby_birth_id
  
  cervical_scans:
    key_columns: [m_cpr]
    combine: merge
    sources:
      - source_file: Mor - CPMI - Procedurer.csv
        type:
          function: extract_codes
          args:
            target_col: ProcedureCode
            match_on: ["UXUD85"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          ProcedureCode: code
          ServiceDate: scan_date
      - source_file: Mor - Obstetrisk Historik DEL 2.csv
        type:
          function: extract_GA
          args:
            target_col: Gestationsalder
        map_columns:
          MOR_CPR: m_cpr
          Dato: birth_date
          Gestationsalder: GA_scan
  
  fertility_treatment:
    key_columns: [m_cpr, code,]
    sources:
      - source_file: Mor - CPMI - Procedurer.csv
        type:
          function: extract_codes
          args:
            target_col: ProcedureCode
            match_on: ["BBHG38", "BJFL0", "AFV01G", ]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          ProcedureCode: code
          ServiceDate: date
      - source_file: Mor - CPMI - Diagnoseliste.csv
        type:
          function: extract_codes
          args:
            target_col: Diagnosekode
            match_on: ["DZ314", "DZ318", "DZ319"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          Diagnosekode: code
          Noteret_dato: date
  
  IVF_pregnancy:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Diagnoseliste.csv
        type:
          function: extract_codes
          args:
            target_col: Diagnosekode
            match_on: ["DO003B", "DZ321H", "DZ358F"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          Diagnosekode: code
          Noteret_dato: date

  multi_pregnancy_diagnosis:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Diagnoseliste.csv
        type:
          function: extract_codes
          args:
            target_col: Diagnosekode
            match_on: ["DO30", "DO31"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          Diagnosekode: code
          Noteret_dato: date

  multi_pregnancy_birth_id:
    key_columns: [m_cpr, baby_birth_id]
    sources:
      - source_file: Mor - Fødselsresume - DEL 1.csv
        type:
          function: fill_matches
          args:
            target_col: "Foster nr."
            match_on: ["Foster 2", "Foster 3", "Foster 4"]
            match_type: exact
            fill_value: "Multiple preg (fødselsresume)"
        map_columns:
          MOR_CPR: m_cpr
          fill_col: code
          BABY_Fødsel_ID: baby_birth_id
    filter:
      function: drop_empty_columns
      args:
        columns: [code]
  
  multi_pregnancy_obs_history:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - Obstetrisk Historik DEL 1.csv
        map_columns:
          MOR_CPR: m_cpr
          Flerfold: code
          "Kontakt dato": date
    filter:
      function: bool_match
      args:
        target_col: code
        op: ">="
        val: 1

  parity:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - Obstetrisk Historik DEL 1.csv
        map_columns:
          MOR_CPR: m_cpr
          "Para": parity
          "Kontakt dato": date
  
  ptb_diagnosis:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Diagnoseliste.csv
        type:
          function: extract_codes
          args:
            target_col: Diagnosekode
            match_on: ["DZ358B", "DO609", "DO601"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          Diagnosekode: code
          Noteret_dato: date
    filter:
      function: drop_empty_columns
      args:
        columns: [code]
  
  ptb_obs_history:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - Obstetrisk Historik DEL 1.csv
        map_columns:
          MOR_CPR: m_cpr
          Præterm: code
          "Kontakt dato": date
    filter:
      function: bool_match
      args:
        target_col: code
        op: ">="
        val: 1


  PPROM_diagnosis:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Diagnoseliste.csv
        type:
          function: extract_codes
          args:
            target_col: Diagnosekode
            match_on: ["DO422", "DO420", "DO424"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          Diagnosekode: code
          Noteret_dato: date
  
  short_cervix_diagnosis:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Diagnoseliste.csv
        type:
          function: extract_codes
          args:
            target_col: Diagnosekode
            match_on: ["DO343", "DO348G", "DO343A", "DO343B", "DZ875A"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          Diagnosekode: code
          Noteret_dato: date

  short_cervical_length_history:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - Yderligere variable vurderingsskema.csv
        type:
          function: extract_codes
          args:
            target_col: Registrering
            match_on: ["Cervix i mm"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          "Værdi": cervix_length
          "Registreringstidspunkt": date
    filter:
      function: bool_match
      args:
        target_col: cervix_length
        op: "<"
        val: 25
  
  cervical_conization_history:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Diagnoseliste.csv
        type:
          function: extract_codes
          args:
            target_col: Diagnosekode
            match_on: ["DZ928C", "DO344B"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          Diagnosekode: code
          Noteret_dato: date
      - source_file: Mor - CPMI - Procedurer.csv
        type:
          function: extract_codes
          args:
            target_col: ProcedureCode
            match_on: ["KLDC00", "KLDC03"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          ProcedureCode: code
          ServiceDate: date

  cesarean_section_procedures:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Procedurer.csv
        type:
          function: extract_codes
          args:
            target_col: ProcedureCode
            match_on: ["KMCA10A", "KMCA10D", "KMCA10E"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          ProcedureCode: code
          ServiceDate: date

  cesarean_section_history:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - Fødselsresume - DEL 1.csv
        type:
          function: extract_non_nan 
          args:
            target_col: "Udslettet dato/tid"
            fill_value: "Cesarean section"
        map_columns:
          MOR_CPR: m_cpr
          fill_col: code
          "Udslettet dato/tid": date

  preclampsia_diagnosis:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Diagnoseliste.csv
        type:
          function: extract_codes
          args:
            target_col: Diagnosekode
            match_on: ["DZ358Q", "DO144", "DO141", "DO140", "DO139"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          Diagnosekode: code
          Noteret_dato: date

  blood_pressure:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Vital parametre.csv
        type:
          function: extract_codes
          args:
            target_col: Vital_parametre
            match_on: ["BT"]
            match_type: exact
        map_columns:
          MOR_CPR: m_cpr
          Vital_parametre: code
          "Værdi": blood_pressure
          "Registreringstidspunkt": date

  uterine_malformation_diagnosis:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Diagnoseliste.csv
        type:
          function: extract_codes
          args:
            target_col: Diagnosekode
            match_on: ["DO340", "DQ518", "DQ519"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          Diagnosekode: code
          Noteret_dato: date
  
  fibroids_diagnosis:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Diagnoseliste.csv
        type:
          function: extract_codes
          args:
            target_col: Diagnosekode
            match_on: ["DD259", "DD250", "DD250C", "DD251", "DD252", "DD250A", "DD250B", "DO341"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          Diagnosekode: code
          Noteret_dato: date
  
  polyhydramnios_diagnosis:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Diagnoseliste.csv
        type:
          function: extract_codes
          args:
            target_col: Diagnosekode
            match_on: ["DO410", "DO409"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          Diagnosekode: code
          Noteret_dato: date

  labor_induction: 
    key_columns: [m_cpr, baby_birth_id]
    sources:
      - source_file: Mor - Fødselsresume - DEL 1.csv
        type:
          function: fill_matches
          args:
            target_col: "Måde"
            match_on: ["Vaginal, igangsat", "Vaginal, igangsat (Udgået)"]
            match_type: exact
            fill_value: "Labor induction"
        map_columns:
          MOR_CPR: m_cpr
          fill_col: code
          BABY_Fødsel_ID: baby_birth_id
          

  vaginal_bleeding_diagnosis:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Diagnoseliste.csv
        type:
          function: extract_codes
          args:
            target_col: Diagnosekode
            match_on: ["DO468A", "DO209", "DO208", "DO208A"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          Diagnosekode: code
          Noteret_dato: date
  
  infections_in_pregnancy:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Diagnoseliste.csv
        type:
          function: extract_codes
          args:
            target_col: Diagnosekode
            match_on: ["DN390A", "DN390", "DA499", "DB349", "DZ038A", "DO234", "DO233", "DO235", "DO239"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          Diagnosekode: code
          Noteret_dato: date

  maternal_comorbidity_diagnosis:
    key_columns: [m_cpr]
    sources:
      - source_file: Mor - CPMI - Diagnoseliste.csv
        type:
          function: extract_codes
          args:
            target_col: Diagnosekode
            match_on: ["DO998", "DO101", "DZ038O", "DO103", "DO992", "DO993B", "DO994", 
                       "DO102", "DO993", "DO996A", "DO991", "DO995", "DO993A", "DO997", 
                       "DO996", "DO989", "DO988", "DO987", "DO983", "DO985", "DO269", 
                       "DO268", "DO266"]
            match_type: startswith
        map_columns:
          MOR_CPR: m_cpr
          Diagnosekode: code
          Noteret_dato: date