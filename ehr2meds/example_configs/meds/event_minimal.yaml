subject_id_col: subject_id

subject:
  subject_id_col: subject_id
  dob:
    code: 
      - DOB
    time: col(birthdate)
    time_format: "%Y-%m-%d %H:%M:%S"
  dod:
    code: 
      - DOD
    time: col(deathdate)
    time_format: "%Y-%m-%d %H:%M:%S"
  gender:
    code:
      - "GENDER"
      - col(gender)
    time: null    
    
admissions:
  admissions:
    code:
      - col(code)
    time: col(timestamp)
    time_format: "%Y-%m-%d %H:%M:%S"

diagnosis:
  diagnosis:
    code:
      - col(code)
    time: col(timestamp)
    time_format: "%Y-%m-%d %H:%M:%S"

medication:
  medication:
    code:
      - col(code)
    time: col(timestamp)
    time_format: "%Y-%m-%d %H:%M:%S"

procedure:
  procedure:
    code:
      - col(code)
    time: col(timestamp)
    time_format: "%Y-%m-%d %H:%M:%S"

labtest:
  labtest:
    code:
      - col(code)
    time: col(timestamp)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: col(numeric_value)

