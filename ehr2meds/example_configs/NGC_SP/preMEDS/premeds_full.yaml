
logging:
  level: INFO
  path: ./outputs/logs

test: true #false
env: local
run_name: MEDS
chunksize: 10000 #250_000_000
paths:
  output: outputs/preMEDS
  concepts: ../../../../../../../../storage/archive/UCPH/DeepFetal/SP/tables
  file_type: csv 

write_file_type: csv

datetime: 
  columns: [timestamp, timestamp_in, timestamp_out]
  timeformat: "%Y-%m-%d %H:%M:%S"

pid_link: 
  join_col: PID
  target_col: CPR_hash

concepts:
  ###### MOR
  admission_m:
    filename: Mor - CPMI - ADT hændelser.csv
    rename_columns:
      MOR_CPR: subject_id
      Flyt_ind: timestamp_in
      Flyt_ud: timestamp_out
      Afsnit: section
      ADT_haendelse: type
    use_adm_move: true # also save all move events

  allergy_m: # Also includes those that are cancelled
    filename: Mor - Allergi.csv
    rename_columns:
      Beskrivelse: code
      Dato for notering: timestamp
      MOR_CPR: subject_id
    code_prefix: "A/"

  diagnosis_m:
    filename: Mor - CPMI - Diagnoseliste.csv
    # columns to keep, rename, and the final names
    rename_columns:
      Diagnosekode: code
      Diagnose: fill_code
      Redigeringsdato: timestamp
      MOR_CPR: subject_id
    code_prefix: "D/"

  medication_m:
    filename: Mor - CPMI - Medicin.csv
    # columns to keep, rename, and the final names
    rename_columns:
      ATC: code
      Administrationstidspunkt: timestamp
      Bestillingsdato: fill_timestamp
      MOR_CPR: subject_id
    fillna:
      timestamp:
        column: fill_timestamp
    code_prefix: "M/"

  procedure_m:
    filename: Mor - CPMI - Procedurer.csv
    # columns to keep, rename, and the final names
    rename_columns:
      ProcedureCode: code
      ServiceDate: timestamp
      MOR_CPR: subject_id
    code_prefix: "P/"

  labtest_m:
    filename: Mor - CPMI - Prøvesvar.csv
    # columns to keep, rename, and the final names
    rename_columns:
      BestOrd: code
      Prøvetagningstidspunkt: timestamp
      Resultatværdi: numeric_value
      MOR_CPR: subject_id
    code_prefix: "L/"
    numeric_columns: [numeric_value]

  notes_m:
    filename: Mor - CPMI - Notater.csv
    # columns to keep, rename, and the final names
    rename_columns:
      Linjenummer: line_number
      Note: note
      Notetype: code
      Speciale: speciality
      MOR_CPR: subject_id
      Redigeringstidspunkt: timestamp
    code_prefix: "N/"
    save_in_chunks: true

  imaging_m: 
    filename: Mor - CPMI - Billeddiagnostik.csv
    rename_columns:
      Procedurekode: code
      Bestillingstidspunkt: timestamp
      MOR_CPR: subject_id
    code_prefix: "P/"

  EWS_m: 
    filename: Mor - CPMI - EWS overbilk.csv
    rename_columns:
      EWS_Måling: code
      Målingstidspunkt: timestamp
      MOR_CPR: subject_id
      Værdi: numeric_value
    code_prefix: "EWS/"
    numeric_columns: [numeric_value]

  ICU_m:
    filename: Mor - CPMI - IP ITA oversigtsrapport.csv
    rename_columns:
      Måling: code
      Målingstidspunkt: timestamp
      Værdi: numeric_value
      MOR_CPR: subject_id
    code_prefix: "ICU/"
    numeric_columns: [numeric_value]
  
  ICU_m: 
    filename: Mor - CPMI - IP ITA resp.csv
    rename_columns:
      Måling: code
      Målingstidspunkt: timestamp
      Værdi: numeric_value
      MOR_CPR: subject_id
    code_prefix: "ICU/"
    numeric_columns: [numeric_value]

  # Results from microbiology missing
  microbiology_m:
    filename: Mor - CPMI - Mikrobiologi Del 1.csv
    rename_columns:
      Provetagningstidspunkt: timestamp
      Komponentnavn: code
      MOR_CPR: subject_id
    code_prefix: "MB/"

  microbiology_m:
    filename: Mor - CPMI - Mikrobiologi Del 3.csv
    rename_columns:
      Provetagningstidspunkt: timestamp
      Organisme: code
      MOR_CPR: subject_id
    code_prefix: "MB/"

  surgery_m:
    filename: Mor - CPMI - Oplysninger om cases.csv
    rename_columns:
      SKS_Kode: code
      Planlagt_til: timestamp
      MOR_CPR: subject_id
    code_prefix: "P/"
  
  vital_signs_m:
    filename: Mor - CPMI - Vital parametre.csv
    rename_columns:
      Vital_parametre: code
      Registreringstidspunkt: timestamp
      MOR_CPR: subject_id
      Værdi: numeric_value
    fillna:
      numeric_value:
        column: Værdi_Omregnet
    code_prefix: "VS/"
    numeric_columns: [numeric_value]

  birth_outcomes_m: 
    filename: Mor - Fødselsresume - DEL 1.csv
    rename_columns:
      Placenta dato: timestamp
      Udfald: code
      MOR_CPR: subject_id
    code_prefix: "B/"

  ordinated_medication_m:
    filename: Mor - Ordinationer.csv
    rename_columns:
      ATC: code
      Ordinationstidspunkt: timestamp
      MOR_CPR: subject_id
    code_prefix: "M/"

