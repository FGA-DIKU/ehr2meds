
logging:
  level: INFO
  path: ./outputs/logs

test: false
env: local
run_name: MEDS
chunksize: 10000
paths:
  output: outputs/preMEDS
  concepts: ../../../../../../../../storage/archive/UCPH/DeepFetal/SP/tables
  file_type: csv 

write_file_type: csv

datetime: 
  columns: [timestamp, timestamp_in, timestamp_out]
  timeformat: "%Y-%m-%d %H:%M:%S"

pid_link: 
  join_col: PID
  target_col: CPR_hash

