
logging:
  level: INFO
  path: ./outputs/logs

test: true #false
env: local
run_name: MEDS
chunksize: 10000 #250_000_000
paths:
  output: outputs/preMEDS
  concepts: ../../../../../../../../storage/archive/UCPH/DeepFetal/SP/tables
  file_type: csv 

write_file_type: csv

datetime: 
  columns: [timestamp, timestamp_in, timestamp_out]
  timeformat: "%Y-%m-%d %H:%M:%S"

pid_link: 
  join_col: PID
  target_col: CPR_hash

concepts:
  admission:
    files:
      - filename: Mor - CPMI - ADT hændelser.csv
        rename_columns:
          MOR_CPR: subject_id
          Flyt_ind: timestamp_in
          Flyt_ud: timestamp_out
          Afsnit: section
          ADT_haendelse: type
      - filename: Barn - CPMI - ADT hændelser.csv
        rename_columns:
          BABY_CPR: subject_id
          Flyt_ind: timestamp_in
          Flyt_ud: timestamp_out
          Afsnit: section
          ADT_haendelse: type
    use_adm_move: true # also save all move events

  allergy: # Also includes those that are cancelled
    files:
      - filename: Mor - Allergi.csv
        rename_columns:
          Beskrivelse: code
          Dato for notering: timestamp
          MOR_CPR: subject_id
      - filename: Barn - Allergi.csv
        rename_columns:
          Beskrivelse: code
          Dato for notering: timestamp
          BABY_CPR: subject_id
    code_prefix: "A/"

  diagnosis:
    files:
      - filename: Mor - CPMI - Diagnoseliste.csv
        rename_columns:
          Diagnosekode: code
          Diagnose: fill_code
          Redigeringsdato: timestamp
          MOR_CPR: subject_id
      - filename: Barn - CPMI - Diagnoseliste.csv
        rename_columns:
          Diagnosekode: code
          Diagnose: fill_code
          Redigeringsdato: timestamp
          BABY_CPR: subject_id
      - filename: Barn - Diagnoser.csv
        rename_columns:
          Diagnosekode: code
          Diagnose: fill_code
          Noteret_dato: timestamp
          BABY_CPR: subject_id
    code_prefix: "D/"

  medication:
    files:
      - filename: Mor - CPMI - Medicin.csv
        rename_columns:
          ATC: code
          Administrationstidspunkt: timestamp
          Bestillingsdato: fill_timestamp
          MOR_CPR: subject_id
      - filename: Barn - CPMI - Medicin.csv
        rename_columns:
          ATC: code
          Administrationstidspunkt: timestamp
          Bestillingsdato: fill_timestamp
          BABY_CPR: subject_id
    fillna:
      timestamp:
        column: fill_timestamp
    code_prefix: "M/"

  procedure:
    files:
      - filename: Mor - CPMI - Procedurer.csv
        rename_columns:
          ProcedureCode: code
          ServiceDate: timestamp
          MOR_CPR: subject_id
      - filename: Barn - CPMI - Procedurer.csv
        rename_columns:
          ProcedureCode: code
          ServiceDate: timestamp
          BABY_CPR: subject_id
    code_prefix: "P/"

  labtest:
    files:
      - filename: Mor - CPMI - Prøvesvar.csv
        rename_columns:
          BestOrd: code
          Prøvetagningstidspunkt: timestamp
          Resultatværdi: numeric_value
          MOR_CPR: subject_id
      - filename: Barn - CPMI - Prøvesvar.csv
        rename_columns:
          BestOrd: code
          Prøvetagningstidspunkt: timestamp
          Resultatværdi: numeric_value
          BABY_CPR: subject_id
    code_prefix: "L/"
    numeric_columns: [numeric_value]

  notes:
    files:
      - filename: Mor - CPMI - Notater.csv
        rename_columns:
          Linjenummer: line_number
          Note: note
          Notetype: code
          Speciale: speciality
          MOR_CPR: subject_id
          Redigeringstidspunkt: timestamp
      - filename: Barn - CPMI - Notater.csv
        rename_columns:
          Linjenummer: line_number
          Note: note
          Notetype: code
          Speciale: speciality
          BABY_CPR: subject_id
          Redigeringstidspunkt: timestamp
    code_prefix: "N/"
    save_in_chunks: true

  imaging: 
    files:
      - filename: Mor - CPMI - Billeddiagnostik.csv
        rename_columns:
          Procedurekode: code
          Bestillingstidspunkt: timestamp
          MOR_CPR: subject_id
      - filename: Barn - CPMI - Billeddiagnostik.csv
        rename_columns:
          Procedurekode: code
          Bestillingstidspunkt: timestamp
          BABY_CPR: subject_id
    code_prefix: "P/"

  EWS: 
    files:
      - filename: Mor - CPMI - EWS overbilk.csv
        rename_columns:
          EWS_Måling: code
          Målingstidspunkt: timestamp
          MOR_CPR: subject_id
          Værdi: numeric_value
      - filename: Barn - CPMI - EWS overbilk.csv
        rename_columns:
          EWS_Måling: code
          Målingstidspunkt: timestamp
          BABY_CPR: subject_id
          Værdi: numeric_value
    code_prefix: "EWS/"
    numeric_columns: [numeric_value]

  ICU:
    files:
      - filename: Mor - CPMI - IP ITA oversigtsrapport.csv
        rename_columns:
          Måling: code
          Målingstidspunkt: timestamp
          Værdi: numeric_value
          MOR_CPR: subject_id
      - filename: Mor - CPMI - IP ITA resp.csv
        rename_columns:
          Måling: code
          Målingstidspunkt: timestamp
          Værdi: numeric_value
          MOR_CPR: subject_id
      - filename: Barn - CPMI - IP ITA oversigtsrapport.csv
        rename_columns:
          Måling: code
          Målingstidspunkt: timestamp
          Værdi: numeric_value
          BABY_CPR: subject_id
      - filename: Barn - CPMI - IP ITA resp.csv
        rename_columns:
          Måling: code
          Målingstidspunkt: timestamp
          Værdi: numeric_value
          BABY_CPR: subject_id
      - filename: Barn - Barn - SAPS3, SOFA og GCS.csv
        rename_columns:
          Måling: code
          Målingstidspunkt: timestamp
          Værdi: numeric_value
          BABY_CPR: subject_id
    code_prefix: "ICU/"
    numeric_columns: [numeric_value]

  # Results from microbiology missing
  microbiology:
    files:
      - filename: Mor - CPMI - Mikrobiologi Del 1.csv
        rename_columns:
          Provetagningstidspunkt: timestamp
          Komponentnavn: code
          MOR_CPR: subject_id
      - filename: Mor - CPMI - Mikrobiologi Del 3.csv
        rename_columns:
          Provetagningstidspunkt: timestamp
          Organisme: code
          MOR_CPR: subject_id
      - filename: Barn - CPMI - Mikrobiologi Del 1.csv
        rename_columns:
          Provetagningstidspunkt: timestamp
          Komponentnavn: code
          BABY_CPR: subject_id
      - filename: Barn - CPMI - Mikrobiologi Del 3.csv
        rename_columns:
          Provetagningstidspunkt: timestamp
          Organisme: code
          BABY_CPR: subject_id
    code_prefix: "MB/"

  surgery:
    files:
      - filename: Mor - CPMI - Oplysninger om cases.csv
        rename_columns:
          SKS_Kode: code
          Planlagt_til: timestamp
          MOR_CPR: subject_id
      - filename: Barn - CPMI - Oplysninger om cases.csv
        rename_columns:
          SKS_Kode: code
          Planlagt_til: timestamp
          BABY_CPR: subject_id
    code_prefix: "P/"
  
  vital_signs:
    files:
      - filename: Mor - CPMI - Vital parametre.csv
        rename_columns:
          Vital_parametre: code
          Registreringstidspunkt: timestamp
          MOR_CPR: subject_id
          Værdi: numeric_value
      - filename: Barn - CPMI - Vital parametre.csv
        rename_columns:
          Vital_parametre: code
          Registreringstidspunkt: timestamp
          BABY_CPR: subject_id
          Værdi: numeric_value
      - filename: Barn - PEWS og Børneundersøgelse +-2 år.csv
        rename_columns:
          Vital_parametre: code
          Registreringstidspunkt: timestamp
          BABY_CPR: subject_id
          Værdi: numeric_value
    fillna:
      numeric_value:
        column: Værdi_Omregnet
    code_prefix: "VS/"
    numeric_columns: [numeric_value]

  birth_outcomes: 
    files:
      - filename: Mor - Fødselsresume - DEL 1.csv
        rename_columns:
          Placenta dato: timestamp
          Udfald: code
          MOR_CPR: subject_id
    code_prefix: "B/"

  ordinated_medication:
    files:
      - filename: Mor - Ordinationer.csv
        rename_columns:
          ATC: code
          Ordinationstidspunkt: timestamp
          MOR_CPR: subject_id
      - filename: Barn - Ordinationer.csv
        rename_columns:
          ATC: code
          Ordinationstidspunkt: timestamp
          BABY_CPR: subject_id
    code_prefix: "M/"

  tilsyn: 
    files:
      - filename: Mor - CPMI - best-ord på tilsyn.csv
        rename_columns:
          ProcedureCode: code
          Bestillingsdato: timestamp
          MOR_CPR: subject_id
      - filename: Barn - CPMI - best-ord på tilsyn.csv
        rename_columns:
          ProcedureCode: code
          Bestillingsdato: timestamp
          BABY_CPR: subject_id
    code_prefix: "T/"

patients_info:
  files:
    - filename: Mor - CPMI - Patientinfo.csv
      rename_columns:
        MOR_CPR: subject_id
        Fødselsdato: birthdate
        Dødsdato: deathdate
        Køn: gender
    - filename: Barn - CPMI - Patientinfo.csv
      rename_columns:
        BABY_CPR: subject_id
        Fødselsdato: birthdate
        Dødsdato: deathdate
        Køn: gender
    - filename: Mor - Patientinfo tillæg til CPMI.csv
      rename_columns:
        MOR_CPR: subject_id
        Rygestatus: smoking_status
        Misbrug: drug_use
  file_type: csv
