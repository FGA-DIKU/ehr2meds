
logging:
  level: INFO
  path: ./outputs/logs

test: true
env: local
run_name: MEDS
chunksize: 10000
paths:
  output: outputs/preMEDS
  concepts: ../../../../../../../../storage/archive/UCPH/DeepFetal/SP/tables
  file_type: csv 

write_file_type: csv

datetime: 
  columns: [timestamp]
  timeformat: "%Y-%m-%d %H:%M:%S"

pid_link: 
  join_col: PID
  target_col: CPR_hash

concepts:
  diagnosis:
    filename: Mor - CPMI - Diagnoseliste.csv
    # columns to keep, rename, and the final names
    rename_columns:
      Diagnosekode: code
      Diagnose: fill_code
      Redigeringsdato: timestamp
      MOR_CPR: subject_id
    code_prefix: "D/"

  medication:
    filename: Mor - CPMI - Medicin.csv
    # columns to keep, rename, and the final names
    rename_columns:
      ATC: code
      Administrationstidspunkt: timestamp
      Bestillingsdato: fill_timestamp
      MOR_CPR: subject_id
    fillna:
      timestamp:
        column: fill_timestamp
    code_prefix: "M/"

  procedure:
    filename: Mor - CPMI - Procedurer.csv
    # columns to keep, rename, and the final names
    rename_columns:
      ProcedureCode: code
      ServiceDate: timestamp
      MOR_CPR: subject_id
    code_prefix: "P/"

  labtest:
    filename: Mor - CPMI - Prøvesvar.csv
    # columns to keep, rename, and the final names
    rename_columns:
      BestOrd: code
      Prøvetagningstidspunkt: timestamp
      Resultatværdi: numeric_value
      MOR_CPR: subject_id
    code_prefix: "L/"
    numeric_columns: [numeric_value]

  notes:
    filename: Mor - CPMI - Notater.csv
    # columns to keep, rename, and the final names
    rename_columns:
      Linjenummer: line_number
      Note: note
      Notetype: code
      Speciale: speciality
      MOR_CPR: subject_id
      Redigeringstidspunkt: timestamp
    code_prefix: "N/"
    save_in_chunks: true


patients_info:
  filename: Mor - CPMI - Patientinfo.csv
  rename_columns:
    MOR_CPR: subject_id
    Fødselsdato: birthdate
    Dødsdato: deathdate
    Køn: gender
  file_type: csv