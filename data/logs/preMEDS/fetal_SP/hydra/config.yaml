logging:
  level: INFO
  path: ${oc.env:EHR2MEDS_DATA}/logs/${hydra:job.config_name}
test: false
chunksize: 10000
align_timestamps:
  names:
  - timestamp
  format: '%Y-%m-%d %H:%M:%S'
paths:
  concepts: ${oc.env:EHR2MEDS_DATA}/raw/fetal_data/SP
  output: ${oc.env:EHR2MEDS_DATA}/preMEDS/fetal_data/SP
write_file_type: csv
concepts:
  diagnosis:
    filename: diagnosis.csv
    rename_columns:
      Diagnosekode: code
      Redigeringsdato: timestamp
      CPR: subject_id
    file_info:
      sep: "\t"
      encoding: iso8859-1
  procedure:
    filename: procedure.csv
    rename_columns:
      Procedurekode: code
      Redigeringsdato: timestamp
      CPR: subject_id
  admissions:
    filename: admissions.csv
    rename_columns:
      Flyt_ind: timestamp_in
      Flyt_ud: timestamp_out
      Afsnit: code
      CPR: subject_id
    melt_table:
    - target_name: timestamp
      source_cols:
      - timestamp_in
      - timestamp_out
      prefix_col: code
      prefix_map:
        timestamp_in: IN/
        timestamp_out: OUT/
  labtest:
    filename: labtest.asc
    rename_columns:
      BestOrd: code
      Bestillingsdato: timestamp
      CPR: subject_id
      Resultatværdi: numeric_value
    file_info:
      sep: '|'
      encoding: latin1
patients_info:
  filename: patient_info.csv
  rename_columns:
    CPR: subject_id
    Birthdate: birthdate
    Deathdate: deathdate
    Gender: gender
