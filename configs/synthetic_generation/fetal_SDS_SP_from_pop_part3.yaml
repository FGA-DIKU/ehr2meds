# @package _global_
defaults: 
  - ../root_config@
  - _self_

paths:
  output: ${oc.env:EHR2MEDS_DATA}/raw/fetal_data/SDS_AND_SP_from_population

N: 1000 
linked_data:
  diagnosis:
    N: ${N}
    columns:
      Diagnosekode:
        type: medical_code
        args:
          prefix: "D"
      Redigeringsdato:
        type: rand_datetime 
    linked_columns:
      CPR:
        type: choice
        file: patient_info
        linked_on: [CPR]
    save_info:
      file_type: csv
      args:
        sep: "\t"
        encoding: "iso8859-1"

  procedure:
    N: ${N}
    columns:
      Procedurekode:
        type: medical_code
        args:
          prefix: "P"
      Redigeringsdato:
        type: rand_datetime
    linked_columns:
      CPR:
        type: choice
        file: patient_info
        linked_on: [CPR]

  labtest:
    N: ${N}
    columns:
      BestOrd:
        type: mix_function
        args:
          functions:
            - type: rand_string
              args:
                min_length: 20
                max_length: 100
            - type: choice
              args:
                options: ["EKG", "KBT", "Blodprøve, UG:2", "Andet", "BT", "COVID", "test;længde"]
          probabilities: [0.5, 0.5]
      Bestillingsdato:
        type: rand_datetime
      Enhed:
        type: choice
        args:
          options: ["fl", "mmol/l", "10^9/l", "fmol", "U/L"]
      Resultatværdi:
        type: mix_function
        args:
          functions:
            - type: rand_float
              args:
                min_val: 0.001
                max_val: 100
            - type: rand_int
              args:
                min_val: 0
                max_val: 300
            - type: choice
              args:
                options: ["Positive", "Negative", "Ikke påvist", "påvist", "0 Rhd pos"]
          probabilities: [0.4, 0.4, 0.2]
    linked_columns:
      CPR:
        type: choice
        file: patient_info
        linked_on: [CPR]
    save_info:
      file_type: asc
      args:
        sep: "|"
        encoding: "latin1"

  notes:
    N: ${N}
    columns:
      Linjenummer:
        type: rand_int
        args:
          min_val: 1
          max_val: 10
      Redigeringstidspunkt:
        type: rand_datetime
      Notetype:
        type: choice
        args:
          options: ["Opfølgning", "Indlæggelse", "Operation"]
      Speciale:
        type: choice
        args:
          options: ["Nefrologi", "Gastroenterologi", "Kardiologi", "Endokrinologi", "Nervensundhed", "Andet"]
        corruptions:
          - type: insert_nan
            args:
              probability: 0.05
      note:
        type: rand_string
        args:
          min_length: 10
          max_length: 3000
    linked_columns:
      CPR:
        type: choice
        file: patient_info
        linked_on: [CPR]


  admissions:
    N: ${N}
    columns:
      Flyt_ind:
        type: rand_date
      Flyt_ud:
        type: greater_than_date
        match:
          min_date: Flyt_ind
      ADT_haendelse:
        type: choice
        args:
          options: ["Indlæggelse", "Flyt_ind", "Tilbage fra orlov"]
      Afsnit:
        type: choice
        args:
          options: ["HGH, AKUTKLINIK GE-GAMMEL", "NOH COAC0821, ØJENAFD. AMBULATORIEAFSNIT", 
                    "NEURO", "CARDIO", "NEFRO"]
    linked_columns:
      CPR:
        type: choice
        file: patient_info
        linked_on: [CPR]

  Mor - Obstetrisk Historik DEL 1:
    N: ${N}
    columns:
      Para:
        type: rand_int
        args:
          min_val: 1
          max_val: 5
      Flerfold: 
        type: rand_int
        args:
          min_val: 1
          max_val: 4
        corruptions:
          - type: insert_nan
            args:
              probability: 0.6
      Kontakt dato:
        type: rand_date
        args:
          start: 2010
    linked_columns:
      MOR_CPR:
        type: choice
        file: Mor - CPMI - Patientinfo
        linked_on: [MOR_CPR]

  Mor - Obstetrisk Historik DEL 2:
    N: ${N}
    columns:
      Gestationsalder:
        type: choice
        args:
          options: ["34w0d", "35w0d", "36w0d", "37w0d", "38w0d", "39w0d", "40w0d", "41w0d", "42w0d",
                    "34w6d", "35w6d", "36w6d", "37w6d", "38w6d", "39w6d", "40w6d", "41w6d", "42w6d", 
                    "32w3d", "33w3d", "34w3d", "35w3d", "36w3d", "37w3d", "38w3d", "39w3d", "40w3d", "41w3d", "42w3d"]
      Dato:
        type: rand_date
        args:
          start: 2010
    linked_columns:
      MOR_CPR:
        type: choice
        file: Mor - CPMI - Patientinfo
        linked_on: [MOR_CPR]
  
  Mor - Patientinfo tillæg til CPMI:
    N: ${N}
    columns:
      "Dato for seneste opdatering":
        type: rand_datetime
        args:
          start: 2010
      Alkohol - Antal ugentlige genstande: 
        type: rand_int
        args:
          min_val: 0
          max_val: 10
        corruptions:
          - type: insert_nan
            args:
              probability: 0.8
      Rygestatus: 
        type: choice
        args: 
          options: ["Tidligere", "Nogle dage", "Aldrig"]
      Etnicitet:
        type: choice
        args:
          options: ["Unspecified", "Nordeuropa", "Asien", "Mellemøsten"]
    linked_columns:
      MOR_CPR:
        type: choice
        file: Mor - CPMI - Patientinfo
        linked_on: [MOR_CPR]

  Mor - Yderligere variable vurderingsskema:
    N: ${N}
    columns:
      Værdi:
        type: mix_function
        args:
          functions:
            - type: rand_float
              args:
                min_val: 0
                max_val: 100
            - type: choice
              args:
                options: [".", "", "<25", ">25", "positive", "negative", "hovedstilling", "Lejeændring;STAN;HSP"]
          probabilities: [0.8, 0.2]
      Registrering:
        type: choice
        args:
          options: ["Cervix i mm", "Handlinger", "Præsentation", "Risikofaktorer"]
      Registreringstidspunkt:
        type: rand_datetime
        args:
          start: 2010
    linked_columns:
      MOR_CPR:
        type: choice
        file: Mor - CPMI - Patientinfo
        linked_on: [MOR_CPR]
