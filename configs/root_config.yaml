hydra:
  verbose: false
  output_subdir: hydra
  # Keep the original working directory; otherwise relative paths in job configs
  # (e.g. paths.output: ../data/...) resolve from ${hydra.run.dir}/.../logs/... and
  # look like they live "under logs".
  job:
    chdir: false
  # Do not write under ${EHR2MEDS_DATA}/logs (often missing or permission-restricted).
  # Hydra still needs a writable run dir for its snapshot; keep it under the launch cwd.
  run:
    dir: ${hydra.runtime.cwd}/outputs/hydra/${hydra:job.config_name}

logging:
  level: INFO
  path: ${hydra.runtime.cwd}/outputs/logs/${hydra:job.config_name}
