subject_id_col: subject_id

# Patient demographics
subject:
  subject_id_col: subject_id
  dob:
    code:
      - DOB
    time: col(birthdate)
    time_format: "%Y-%m-%d"
  dod:
    code:
      - DOD
    time: col(deathdate)
    time_format: "%Y-%m-%d"
  gender:
    code:
      - GENDER
      - col(gender)
    time: null

# Pathology 
SDS_dimpatologiskdiagnose:
  SDS_dimpatologiskdiagnose:
    code:
      - "PAT/"
      - col(code)
    time: col(timestamp)
    time_format: "%Y-%m-%dT%H:%M:%S"

