name: 'Pipeline test'

on:
  push:
    branches: [ "fix_tests" ]
  pull_request:
    branches: [ "fix_tests" ]
      
permissions:
  contents: read
  pull-requests: read

env:
  EHR2MEDS_CONFIGS: "${{ github.workspace }}/configs"
  EHR2MEDS_DATA: "${{ github.workspace }}/data"
  HYDRA_FULL_ERROR: 1

jobs:
    pipeline_tests:
        runs-on: "ubuntu-latest"
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.12'
                cache: 'pip' 
                cache-dependency-path: 'pyproject.toml'

            - name: Install Dependencies
              run: |
                pip install .[dev]

            - name: Create synthetic data
              run: |
                python ehr2meds/generate_synthetic_raw_data.py --config-name synthetic_generation/fetal_SDS_SP_from_pop_part1.yaml N=50 N_population=75
                python ehr2meds/generate_synthetic_raw_data.py --config-name synthetic_generation/fetal_SDS_SP_from_pop_part2.yaml N=50
                python ehr2meds/generate_synthetic_raw_data.py --config-name synthetic_generation/fetal_SDS_SP_from_pop_part3.yaml N=50

            - name: Convert synthetic data to preMEDS
              run: |
                python ehr2meds/convert_raw_to_premeds.py --config-name preMEDS/fetal_SP_synth

